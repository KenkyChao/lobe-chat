<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NaiYunHub</title>
    <style>
      .drag-bar {
        position: fixed;
        top: 0;
        right: 0;
        left: 0;

        height: 48px;

        -webkit-app-region: drag;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;

        height: 100vh;
        margin: 0;
        padding: 48px 0 0;
        overflow: hidden;

        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        color: #1f1f1f;
      }

      @media (prefers-color-scheme: dark) {
        body {
          color: #f5f5f5;
        }
      }

      .brand {
        display: flex;
        gap: 14px;
        align-items: center;
        justify-content: center;

        opacity: 0.82;
      }

      .brand-logo {
        width: 48px;
        height: 48px;
        object-fit: contain;
      }

      .brand-text {
        user-select: none;

        font-size: 32px;
        font-weight: 700;
        line-height: 1;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <div class="drag-bar"></div>
    <div aria-label="Loading NaiYunHub" class="brand" role="status">
      <img alt="NaiYunHub" class="brand-logo" src="./naiyunhub-logo.png" />
      <span class="brand-text">NaiYunHub</span>
    </div>
  </body>
</html>
