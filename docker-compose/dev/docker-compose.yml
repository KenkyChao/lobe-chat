name: naiyunhub

x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: '100m'
    max-file: '3'

services:
  network-service:
    image: alpine
    container_name: naiyun-network
    restart: unless-stopped
    logging: *default-logging
    ports:
      - '${LOBE_PORT:-3010}:3210' # LobeChat Web
    command: tail -f /dev/null
    extra_hosts:
      # 把 chat.naiyun.com 固定到公网网关 112.80.133.252，容器可直接到达。
      # 不要依赖宿主机 DNS：宿主走 Clash/Surge fake-ip(198.18.x.x)，容器拿到后无法路由。
      # 注：Agent 的 "Premature close" 与此 IP 无关，根因是 OpenAI SDK 默认用 node-fetch，
      #     已在 packages/model-runtime 改为 undici 修复(见该文件构造函数注释)。
      - 'chat.naiyun.com:112.80.133.252'
    networks:
      - naiyunhub-network

  lobe:
    image: naiyunchat-db:${NAIYUNCHAT_DB_VERSION:-2.2.4}
    pull_policy: never
    container_name: naiyunhub
    restart: unless-stopped
    mem_limit: 2g
    cpus: 2
    security_opt:
      - no-new-privileges:true
    logging: *default-logging
    network_mode: 'service:network-service'
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
      searxng:
        condition: service_started
    env_file:
      - ${NAIYUN_ENV_FILE:-../../.env.development}
    environment:
      - 'APP_URL=${APP_URL:-http://127.0.0.1:3010}'
      - 'INTERNAL_APP_URL=http://127.0.0.1:3210'
      - 'DATABASE_DRIVER=node'
      - 'DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@127.0.0.1:5432/${LOBE_DB_NAME:-postgres}'
      - 'REDIS_URL=redis://127.0.0.1:6379'
      - 'REDIS_PREFIX=${REDIS_PREFIX:-lobechat}'
      - 'REDIS_TLS=0'
      - 'SEARXNG_URL=http://127.0.0.1:8080'

  postgresql:
    image: paradedb/paradedb:latest-pg17
    container_name: naiyun-postgres
    restart: unless-stopped
    logging: *default-logging
    network_mode: 'service:network-service'
    volumes:
      - './data:/var/lib/postgresql/data'
    environment:
      - 'POSTGRES_DB=${LOBE_DB_NAME:-postgres}'
      - 'POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}'
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U postgres' ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: naiyun-redis
    restart: unless-stopped
    logging: *default-logging
    network_mode: 'service:network-service'
    command: redis-server --save 60 1000 --appendonly yes
    volumes:
      - 'redis_data:/data'
    healthcheck:
      test: [ 'CMD', 'redis-cli', 'ping' ]
      interval: 5s
      timeout: 3s
      retries: 5

  searxng:
    image: searxng/searxng:latest
    container_name: naiyun-searxng
    restart: unless-stopped
    logging: *default-logging
    network_mode: 'service:network-service'
    volumes:
      - './searxng-settings.yml:/etc/searxng/settings.yml'
    environment:
      - 'SEARXNG_SETTINGS_FILE=/etc/searxng/settings.yml'

volumes:
  redis_data:
    driver: local

networks:
  naiyunhub-network:
    driver: bridge
