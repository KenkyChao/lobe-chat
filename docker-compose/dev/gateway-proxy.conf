# 生产内网专用反向代理（TCP 透传 / stream）
# ------------------------------------------------------------------------
# 作用：容器把 chat.naiyun.com 解析到本代理(127.0.0.1)，本代理按"端口"把流量
#       转发到正确的内网机器。解决"一个域名、三个端口、三台机器"无法用单条
#       /etc/hosts 分流的问题。
# TLS：由后端用 chat.naiyun.com 证书做端到端 TLS，本代理只透传 TCP，不需要证书。
# 维护：内网 IP 变了，改下面 proxy_pass 的目标即可。
# ------------------------------------------------------------------------

worker_processes auto;
# 日志直接吐到容器 stdout/stderr，便于 `docker logs naiyun-gateway-proxy` 排查转发情况。
error_log /dev/stderr warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

stream {
  # 连接超时与基本日志（便于排查）
  proxy_connect_timeout 8s;
  proxy_timeout 10m; # 流式 SSE 长连接，给足空闲时间
  log_format basic '$remote_addr -> $upstream_addr status=$status bytes=$bytes_sent';
  access_log /dev/stdout basic;

  # ── LLM 网关：OPENROUTER_PROXY_URL = https://chat.naiyun.com:18443/v1 ──
  server {
    listen 127.0.0.1:18443;
    proxy_pass 192.168.1.124:18443;
  }

  # ── Casdoor 认证：AUTH_CASDOOR_ISSUER = https://chat.naiyun.com:10087 ──
  # 容器登录时服务端要调 OIDC(token/JWKS)，必须可达。
  server {
    listen 127.0.0.1:10087;
    proxy_pass 192.168.1.69:10087;
  }

  # ── NaiYunHub Web 入口：APP_URL / 图片视频生成 / 邮件链接 / OIDC 回跳公开地址 = https://chat.naiyun.com:10085 ──
  # 容器内如果需要访问公开 Web 域名(例如图片/视频生成回调、资源读取、Better Auth、邮件模板链接校验、服务端自调)，
  # 不能走公网 DNS/NAT 回流，否则在内网服务器上容易超时或回到错误链路。
  # 不配置该端口时，图片和视频生成流程可能因为无法访问公开 Web 地址而失败。
  # 这里把 chat.naiyun.com:10085 透传到内网 Web 入口机器，由后端继续处理 TLS。
  server {
    listen 127.0.0.1:10085;
    proxy_pass 192.168.1.69:10085;
  }
}
