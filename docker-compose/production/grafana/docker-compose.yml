name: naiyunhub-observability

services:
  network-service:
    image: 192.168.1.211:5001/naiyun-registry/library/alpine:latest
    container_name: naiyun-observability-network
    restart: always
    ports:
      - '${LOBE_PORT:-3010}:3210' # naiyunhub Web
      - '${GRAFANA_PORT:-3000}:3000' # Grafana
      - '${OTEL_HTTP_PORT:-4318}:4318' # OpenTelemetry HTTP
      - '${OTEL_GRPC_PORT:-4317}:4317' # OpenTelemetry gRPC
    command: tail -f /dev/null
    networks:
      - naiyun-observability-network

  lobe:
    image: naiyunchat-db:${NAIYUNCHAT_DB_VERSION:-2.2.4}
    pull_policy: never
    container_name: naiyunhub-observability
    restart: always
    network_mode: 'service:network-service'
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
      searxng:
        condition: service_started
      otel-collector:
        condition: service_started
    env_file:
      - ${NAIYUN_ENV_FILE:-../../../.env.prod}
    environment:
      - 'APP_URL=${APP_URL:-http://127.0.0.1:3010}'
      - 'INTERNAL_APP_URL=http://127.0.0.1:3210'
      - 'DATABASE_DRIVER=node'
      - 'DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@127.0.0.1:5432/${LOBE_DB_NAME:-postgres}'
      - 'REDIS_URL=redis://127.0.0.1:6379'
      - 'REDIS_PREFIX=${REDIS_PREFIX:-lobechat}'
      - 'REDIS_TLS=0'
      - 'SEARXNG_URL=http://127.0.0.1:8080'
      - 'OTEL_SERVICE_NAME=naiyunhub'
      - 'OTEL_EXPORTER_OTLP_METRICS_PROTOCOL=http/protobuf'
      - 'OTEL_EXPORTER_OTLP_METRICS_ENDPOINT=http://127.0.0.1:4318/v1/metrics'
      - 'OTEL_EXPORTER_OTLP_TRACES_PROTOCOL=http/protobuf'
      - 'OTEL_EXPORTER_OTLP_TRACES_ENDPOINT=http://127.0.0.1:4318/v1/traces'

  postgresql:
    image: 192.168.1.211:5001/naiyun-registry/paradedb/paradedb:latest-pg17
    container_name: naiyun-observability-postgres
    restart: always
    network_mode: 'service:network-service'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - 'POSTGRES_DB=${LOBE_DB_NAME:-postgres}'
      - 'POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}'
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U postgres' ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: 192.168.1.211:5001/naiyun-registry/library/redis:7-alpine
    container_name: naiyun-observability-redis
    restart: always
    network_mode: 'service:network-service'
    command: redis-server --save 60 1000 --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ 'CMD', 'redis-cli', 'ping' ]
      interval: 5s
      timeout: 3s
      retries: 5

  searxng:
    image: 192.168.1.211:5001/naiyun-registry/searxng/searxng:latest
    container_name: naiyun-observability-searxng
    restart: always
    network_mode: 'service:network-service'
    volumes:
      - './searxng-settings.yml:/etc/searxng/settings.yml'
    environment:
      - 'SEARXNG_SETTINGS_FILE=/etc/searxng/settings.yml'

  grafana:
    image: 192.168.1.211:5001/naiyun-registry/grafana/grafana:12.2.0-17419259409
    container_name: naiyun-observability-grafana
    restart: always
    network_mode: 'service:network-service'
    environment:
      - 'GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:?GF_SECURITY_ADMIN_PASSWORD is required}'
      - 'GF_FEATURE_TOGGLES_ENABLE=traceqlEditor'
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - tempo
      - prometheus

  tempo:
    image: 192.168.1.211:5001/naiyun-registry/grafana/tempo:latest
    container_name: naiyun-observability-tempo
    restart: always
    network_mode: 'service:network-service'
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo.yaml
      - tempo_data:/var/tempo
    command: [ '-config.file=/etc/tempo.yaml' ]

  prometheus:
    image: 192.168.1.211:5001/naiyun-registry/prom/prometheus:latest
    container_name: naiyun-observability-prometheus
    restart: always
    network_mode: 'service:network-service'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.enable-otlp-receiver'
      - '--web.enable-remote-write-receiver'
      - '--enable-feature=exemplar-storage'

  otel-collector:
    image: 192.168.1.211:5001/naiyun-registry/otel/opentelemetry-collector:latest
    container_name: naiyun-observability-otel-collector
    restart: always
    network_mode: 'service:network-service'
    volumes:
      - ./otel-collector/collector-config.yaml:/etc/otelcol/config.yaml
    command: [ '--config', '/etc/otelcol/config.yaml' ]
    depends_on:
      - tempo
      - prometheus

  otel-tracing-test:
    profiles:
      - otel-test
    image: ghcr.io/grafana/xk6-client-tracing:v0.0.9
    container_name: naiyun-observability-otel-tracing-test
    restart: always
    network_mode: 'service:network-service'
    environment:
      - ENDPOINT=127.0.0.1:4317

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  grafana_data:
    driver: local
  tempo_data:
    driver: local
  prometheus_data:
    driver: local

networks:
  naiyun-observability-network:
    driver: bridge
